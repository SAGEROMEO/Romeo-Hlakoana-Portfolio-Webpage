<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Romeo Hlakoana</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="contact-page">

    <header class="contact-header">
        <pre>
        <h1>I am open to connecting and collaborating.</h1>
        <p class="email-link">hmonwabise@gmail.com</p>
        </pre>
    </header>

    <main class="container">
        <section class="contact-card">
            <div class="card-header">
                <h2>Contact Me</h2>
                <p>Fill out the form below to send me a message.</p>
            </div>

            <form action="https://api.web3forms.com/submit" method="POST" id="contact-form">
                <input type="hidden" name="access_key" value="18c40de9-9de5-4909-b1f9-c81cc534af9a" />
                <input type="checkbox" name="botcheck" style="display: none;" />

                <div class="form-row">
                    <div class="form-group">
                        <label for="first_name">First Name</label>
                        <input type="text" name="name" id="first_name" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label for="last_name">Last Name</label>
                        <input type="text" name="last_name" id="last_name" placeholder="Doe" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" name="email" id="email" placeholder="you@company.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="text" name="phone" id="phone" placeholder="+27..." required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea name="message" id="message" rows="5" placeholder="How can I help you?" required></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
                <p id="result"></p>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div class="social-links">
            <a href="your-linkedin-link" target="_blank">LinkedIn</a>
            <a href="your-github-link" target="_blank">GitHub</a>
        </div>
        <p>&copy; 2026 Romeo Monwabise Hlakoana. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
